<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050608"/>
      <stop offset="100%" stop-color="#07080b"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#5af787" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#5af787" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>
  <rect width="800" height="200" fill="url(#glow)"/>

  <!-- Grid -->
  <pattern id="g" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-opacity="0.02" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="200" fill="url(#g)"/>

  <!-- Decorative hexagons -->
  <g stroke="#5af787" fill="none" opacity="0.1">
    <path d="M680 30 l16 -9 l16 9 l0 20 l-16 9 l-16 -9 z" stroke-width="0.7"/>
    <path d="M715 50 l12 -7 l12 7 l0 14 l-12 7 l-12 -7 z" stroke-width="0.5"/>
    <path d="M695 75 l10 -6 l10 6 l0 12 l-10 6 l-10 -6 z" stroke-width="0.5" opacity="0.6"/>
    <path d="M740 25 l8 -5 l8 5 l0 10 l-8 5 l-8 -5 z" stroke-width="0.4" opacity="0.4"/>
    <path d="M750 65 l14 -8 l14 8 l0 17 l-14 8 l-14 -8 z" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Logo -->
  <g transform="translate(40, 55)">
    <svg width="44" height="44" viewBox="0 0 60 60">
      <path d="M30 3 L53 16 L53 44 L30 57 L7 44 L7 16 Z" stroke="#5af787" stroke-width="2" fill="#5af787" fill-opacity="0.08"/>
      <path d="M22 25 Q22 35 30 35 Q38 35 38 25 Q38 18 32 18" stroke="#5af787" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </svg>
  </g>

  <!-- Wordmark -->
  <text x="94" y="88" font-family="Georgia, serif" font-size="30" font-weight="300" letter-spacing="-0.8" fill="#f0f1f5">Hook<tspan fill="#5af787">OS</tspan></text>

  <!-- Status -->
  <g transform="translate(40, 110)">
    <circle cx="4" cy="5" r="2.5" fill="#5af787"/>
    <text x="14" y="8" font-family="monospace" font-size="8.5" letter-spacing="1.2" fill="#74757f">PROGRAMMABLE MARKET ENGINE · V4 HOOKS · LIVE ON BASE</text>
  </g>

  <!-- Tagline -->
  <text x="40" y="160" font-family="Georgia, serif" font-size="28" font-weight="300" letter-spacing="-1">
    <tspan fill="#f0f1f5">Markets </tspan><tspan fill="#74757f" font-style="italic">are now </tspan><tspan fill="#5af787">software.</tspan>
  </text>

  <!-- Bottom line -->
  <line x1="40" y1="185" x2="760" y2="185" stroke="#5af787" stroke-opacity="0.15" stroke-width="0.5"/>
  <text x="40" y="196" font-family="monospace" font-size="7.5" letter-spacing="1" fill="#3d3e46">BASE · ETH · UNICHAIN · ARB · BNB · HYPER · MEGA · INK · XLAYER</text>
</svg>