<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050608"/>
      <stop offset="50%" stop-color="#07080b"/>
      <stop offset="100%" stop-color="#060709"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#5af787" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#5af787" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#5af787" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="90%" r="40%">
      <stop offset="0%" stop-color="#6db8e8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6db8e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5af787" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#5af787" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#5af787" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5af787" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#5af787" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="acidLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5af787" stop-opacity="0"/>
      <stop offset="30%" stop-color="#5af787" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#5af787" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5af787" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#glow)"/>
  <rect width="1200" height="400" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="88" height="88" patternUnits="userSpaceOnUse">
    <path d="M 88 0 L 0 0 0 88" fill="none" stroke="white" stroke-opacity="0.025" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#grid)" opacity="0.5"/>

  <!-- Hex pattern - scattered decorative hexagons -->
  <g stroke="#5af787" fill="none" opacity="0.12">
    <!-- Top right cluster -->
    <path d="M1020 40 l18 -10 l18 10 l0 22 l-18 10 l-18 -10 z" stroke-width="0.8"/>
    <path d="M1060 55 l18 -10 l18 10 l0 22 l-18 10 l-18 -10 z" stroke-width="0.6" opacity="0.7"/>
    <path d="M1040 85 l18 -10 l18 10 l0 22 l-18 10 l-18 -10 z" stroke-width="0.5" opacity="0.5"/>
    <path d="M1090 30 l12 -7 l12 7 l0 14 l-12 7 l-12 -7 z" stroke-width="0.6" opacity="0.6"/>
    <path d="M1110 65 l12 -7 l12 7 l0 14 l-12 7 l-12 -7 z" stroke-width="0.5" opacity="0.4"/>
    <!-- Bottom left cluster -->
    <path d="M80 310 l14 -8 l14 8 l0 17 l-14 8 l-14 -8 z" stroke-width="0.7" opacity="0.5"/>
    <path d="M110 330 l14 -8 l14 8 l0 17 l-14 8 l-14 -8 z" stroke-width="0.5" opacity="0.3"/>
    <path d="M60 340 l10 -6 l10 6 l0 12 l-10 6 l-10 -6 z" stroke-width="0.5" opacity="0.25"/>
    <!-- Mid right -->
    <path d="M1130 180 l20 -11 l20 11 l0 24 l-20 11 l-20 -11 z" stroke-width="0.6" opacity="0.15"/>
    <path d="M1100 220 l14 -8 l14 8 l0 17 l-14 8 l-14 -8 z" stroke-width="0.5" opacity="0.1"/>
  </g>

  <!-- Concentric tick rings around logo area -->
  <g transform="translate(900, 190)">
    <circle r="160" fill="url(#coreGlow)"/>
    <!-- Ring 1 -->
    <circle r="70" fill="none" stroke="#5af787" stroke-opacity="0.15" stroke-width="0.8" stroke-dasharray="3 8"/>
    <!-- Ring 2 -->
    <circle r="100" fill="none" stroke="#5af787" stroke-opacity="0.1" stroke-width="0.7" stroke-dasharray="5 12"/>
    <!-- Ring 3 -->
    <circle r="135" fill="none" stroke="#5af787" stroke-opacity="0.07" stroke-width="0.6" stroke-dasharray="4 16"/>
    <!-- Ring 4 -->
    <circle r="170" fill="none" stroke="#5af787" stroke-opacity="0.04" stroke-width="0.5" stroke-dasharray="3 20"/>

    <!-- Floating token dots on orbits -->
    <circle cx="55" cy="-42" r="8" fill="#5af787" opacity="0.6"/>
    <text x="55" y="-39" text-anchor="middle" font-family="monospace" font-size="6" font-weight="700" fill="#001b07">VA</text>

    <circle cx="-68" cy="18" r="7" fill="#6db8e8" opacity="0.5"/>
    <text x="-68" y="21" text-anchor="middle" font-family="monospace" font-size="5.5" font-weight="700" fill="#001b07">FL</text>

    <circle cx="30" cy="63" r="6.5" fill="#f0c14b" opacity="0.5"/>
    <text x="30" y="66" text-anchor="middle" font-family="monospace" font-size="5" font-weight="700" fill="#001b07">PR</text>

    <circle cx="-45" cy="-55" r="6" fill="#c66be0" opacity="0.45"/>
    <text x="-45" y="-52" text-anchor="middle" font-family="monospace" font-size="5" font-weight="700" fill="#001b07">GH</text>

    <circle cx="80" cy="25" r="5.5" fill="#5af787" opacity="0.4"/>
    <text x="80" y="28" text-anchor="middle" font-family="monospace" font-size="4.5" font-weight="700" fill="#001b07">NE</text>

    <!-- Inner hex core -->
    <path d="M 0 -30 L 26 -15 L 26 15 L 0 30 L -26 15 L -26 -15 Z" stroke="#5af787" stroke-width="1.2" fill="#5af787" fill-opacity="0.06"/>
    <path d="M 0 -42 L 36 -21 L 36 21 L 0 42 L -36 21 L -36 -21 Z" stroke="#5af787" stroke-width="0.6" stroke-opacity="0.3" fill="none"/>
    <circle r="20" fill="#06070a" stroke="#5af787" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="0" y="4" text-anchor="middle" font-family="monospace" font-size="9" fill="#5af787" fill-opacity="0.8">v4</text>
  </g>

  <!-- Wave at bottom -->
  <path d="M0 360 Q150 340 300 355 Q450 370 600 350 Q750 330 900 345 Q1050 360 1200 340 L1200 400 L0 400 Z" fill="url(#waveGrad)" opacity="0.4"/>
  <path d="M0 375 Q200 360 400 370 Q600 380 800 365 Q1000 350 1200 365 L1200 400 L0 400 Z" fill="url(#waveGrad)" opacity="0.2"/>

  <!-- Bottom accent line -->
  <rect x="0" y="397" width="1200" height="3" fill="url(#acidLine)"/>

  <!-- Logo glyph -->
  <g transform="translate(80, 120)">
    <svg width="56" height="56" viewBox="0 0 60 60">
      <path d="M30 3 L53 16 L53 44 L30 57 L7 44 L7 16 Z" stroke="#5af787" stroke-width="2" fill="#5af787" fill-opacity="0.08"/>
      <path d="M22 25 Q22 35 30 35 Q38 35 38 25 Q38 18 32 18" stroke="#5af787" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </svg>
  </g>

  <!-- Wordmark -->
  <text x="148" y="160" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="300" letter-spacing="-1" fill="#f0f1f5">Hook<tspan fill="#5af787">OS</tspan></text>

  <!-- Status pill -->
  <g transform="translate(80, 186)">
    <rect width="210" height="24" rx="12" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08" stroke-width="0.8"/>
    <circle cx="14" cy="12" r="3" fill="#5af787"/>
    <circle cx="14" cy="12" r="5" fill="none" stroke="#5af787" stroke-opacity="0.3" stroke-width="0.8"/>
    <text x="26" y="16" font-family="'Courier New', monospace" font-size="9" letter-spacing="1.5" fill="#74757f">V4 HOOKS · LIVE ON 6 CHAINS</text>
  </g>

  <!-- Tagline -->
  <text x="80" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="300" letter-spacing="-2">
    <tspan fill="#f0f1f5">Markets </tspan><tspan fill="#74757f" font-style="italic">are now</tspan>
  </text>
  <text x="80" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="300" letter-spacing="-2" fill="#5af787">software.</text>

  <!-- Subtitle -->
  <text x="80" y="350" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#b3b4bd" letter-spacing="0.2">The programmable market engine. Launch tokens with custom hooks. Compose markets like Lego.</text>

  <!-- Chain badges bottom left -->
  <g transform="translate(80, 372)" font-family="'Courier New', monospace" font-size="8" letter-spacing="1.5" fill="#3d3e46">
    <text>BASE · ETH · ARB · BNB · POLY · BLAST</text>
  </g>
</svg>